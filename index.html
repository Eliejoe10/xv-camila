<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XV Años de Camila · Galería</title>
<style>
  :root {
    --vino:  #7a1f3d;
    --oro:   #c79a3e;
    --crema: #fbf3ea;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    position: relative;
  }

  /* Foto de fondo difuminada (mismo estilo que la app) */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("fondo.png") center/cover no-repeat;
    filter: blur(14px) brightness(0.8);
    transform: scale(1.12);
    z-index: -2;
  }

  /* Velo para que el contenido se lea bien */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(48, 32, 64, 0.45), rgba(74, 26, 45, 0.62));
    z-index: -1;
  }

  header {
    text-align: center;
    padding: 44px 20px 28px;
  }

  header .eyebrow {
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--oro);
    font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
  }

  header h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 46px;
    color: #fff;
    margin-top: 6px;
    font-weight: 600;
    text-shadow: 0 3px 12px rgba(0,0,0,0.6);
  }

  header .subnombre {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 18px;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }

  header p {
    margin-top: 12px;
    font-size: 14px;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 1px 4px rgba(0,0,0,0.55);
  }

  .divider {
    width: 60px;
    height: 2px;
    background: var(--oro);
    margin: 16px auto 0;
    border-radius: 2px;
  }

  #estado {
    text-align: center;
    padding: 40px 20px;
    font-size: 15px;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 1px 5px rgba(0,0,0,0.6);
  }

  .barra-subir {
    text-align: center;
    padding: 0 20px 24px;
  }

  #btnSubir {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--vino);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    border: none;
    padding: 14px 30px;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(122, 31, 61, 0.30);
  }

  #btnSubir:disabled { opacity: 0.6; }

  #progresoSubida {
    margin-top: 12px;
    font-size: 14px;
    color: #fff;
    min-height: 18px;
    font-weight: 600;
    text-shadow: 0 1px 5px rgba(0,0,0,0.6);
  }

  .grid {
    column-count: 2;
    column-gap: 10px;
    padding: 0 10px 60px;
    max-width: 1100px;
    margin: 0 auto;
  }

  @media (min-width: 640px)  { .grid { column-count: 3; } }
  @media (min-width: 960px)  { .grid { column-count: 4; } }

  .grid img {
    width: 100%;
    display: block;
    border-radius: 12px;
    margin-bottom: 10px;
    background: #eaddcd;
    box-shadow: 0 2px 10px rgba(122, 31, 61, 0.10);
    cursor: pointer;
    break-inside: avoid;
    transition: transform 0.15s ease;
  }

  .grid img:active { transform: scale(0.98); }

  /* Visor de foto a pantalla completa */
  #visor {
    position: fixed;
    inset: 0;
    background: rgba(30, 8, 16, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }

  #visor.abierto { display: flex; }

  #visor img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  #cerrar {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 34px;
    color: var(--crema);
    cursor: pointer;
    line-height: 1;
    user-select: none;
  }

  #descargar {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--oro);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 26px;
    border-radius: 40px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    z-index: 2;
  }

  /* Flechas para navegar entre fotos */
  .nav-flecha {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    color: rgba(255, 255, 255, 0.85);
    cursor: pointer;
    user-select: none;
    padding: 10px 14px;
    line-height: 1;
    z-index: 2;
  }

  .nav-flecha:hover { color: #fff; }
  #anterior { left: 6px; }
  #siguiente { right: 6px; }

  @media (max-width: 640px) {
    .nav-flecha { font-size: 32px; }
  }

  footer {
    text-align: center;
    padding: 24px 20px 40px;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }

  /* ===== Pantalla de bienvenida (igual que la app) ===== */
  #bienvenida {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: opacity 0.6s ease;
  }
  #bienvenida.oculto { opacity: 0; pointer-events: none; }

  #bienvenida .foto {
    position: absolute;
    inset: 0;
    background: url("fondo.png") center/cover no-repeat;
    animation: zoomLento 18s ease-in-out infinite alternate;
    z-index: 0;
  }
  @keyframes zoomLento {
    from { transform: scale(1.03); }
    to   { transform: scale(1.16); }
  }
  #bienvenida .velo {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.38), rgba(0,0,0,0.10) 42%, rgba(74,26,45,0.58));
    z-index: 1;
  }

  #bienvenida .contenido {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 30px;
  }
  #bienvenida .eyebrow {
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--oro);
    font-weight: 700;
    text-shadow: 0 1px 6px rgba(0,0,0,0.75);
  }
  #bienvenida .sub {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 21px;
    color: #fff;
    margin-top: 6px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.75);
  }
  #bienvenida h1 {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 62px;
    color: #fff;
    margin: 2px 0 6px;
    text-shadow: 0 3px 16px rgba(0,0,0,0.75);
  }
  #bienvenida .lineas {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    color: var(--oro); font-size: 14px;
  }
  #bienvenida .lineas span { width: 44px; height: 1.5px; background: var(--oro); display: inline-block; }
  #bienvenida .frase {
    font-size: 15px;
    color: #fff;
    max-width: 330px;
    margin: 16px auto 28px;
    line-height: 1.5;
    text-shadow: 0 2px 8px rgba(0,0,0,0.75);
  }
  #btnEntrar {
    background: linear-gradient(180deg, #f5df99, #c79a3e);
    color: #4a1a2c;
    border: 1px solid rgba(255,255,255,0.7);
    font-family: Georgia, serif;
    font-size: 19px;
    font-weight: 700;
    padding: 15px 62px;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
  }

  .petalo {
    position: absolute;
    top: -24px;
    z-index: 2;
    border-radius: 60% 40% 60% 40%;
    animation: caerPetalo linear infinite;
  }
  @keyframes caerPetalo {
    0%   { transform: translateY(-24px) translateX(0) rotate(0deg); }
    100% { transform: translateY(106vh) translateX(40px) rotate(260deg); }
  }

  #btnMute {
    position: fixed;
    top: 12px; right: 12px;
    z-index: 150;
    background: rgba(0,0,0,0.30);
    color: #fff;
    border: none;
    width: 42px; height: 42px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: none;
  }
</style>
</head>
<body>

  <audio id="audio" loop preload="auto">
    <source src="musica.m4a" type="audio/mp4" />
  </audio>

  <div id="bienvenida">
    <div class="foto"></div>
    <div class="velo"></div>
    <div class="contenido">
      <div class="eyebrow">TE DAMOS LA BIENVENIDA A</div>
      <div class="sub">Los 15 años de</div>
      <h1>Camila</h1>
      <div class="lineas"><span></span>🌿<span></span></div>
      <div class="frase">Una noche de elegancia, flores, familia y amigos para compartir lindos recuerdos</div>
      <button id="btnEntrar">Entrar</button>
    </div>
  </div>

  <button id="btnMute">🔊</button>

  <header>
    <div class="eyebrow">LOS 15 AÑOS DE</div>
    <h1>Camila</h1>
    <div class="divider"></div>
    <p>Fotos de la fiesta · se actualizan solas</p>
  </header>

  <div class="barra-subir">
    <button id="btnSubir">📸 Subir mis fotos</button>
    <input id="inputFotos" type="file" accept="image/*" multiple hidden />
    <div id="progresoSubida"></div>
  </div>

  <div id="estado">Cargando fotos…</div>
  <div class="grid" id="grid"></div>

  <div id="visor">
    <span id="cerrar">&times;</span>
    <span id="anterior" class="nav-flecha">&#8249;</span>
    <img id="visorImg" src="" alt="Foto" />
    <span id="siguiente" class="nav-flecha">&#8250;</span>
    <a id="descargar" href="#" download>Descargar foto</a>
  </div>

  <footer>Con cariño 💛</footer>

<script>
  // Mismos valores que usa la app de iOS (CloudinaryConfig)
  const CLOUD_NAME    = "ml3brljo";
  const TAG           = "camilaxv";
  const UPLOAD_PRESET = "cjwscbz6";

  const grid    = document.getElementById("grid");
  const estado  = document.getElementById("estado");
  const visor   = document.getElementById("visor");
  const visorImg = document.getElementById("visorImg");
  const btnDescargar = document.getElementById("descargar");

  // Guarda los IDs ya mostrados para no duplicar al refrescar
  const mostradas = new Set();

  // Lista de fotos en el mismo orden que la cuadrícula (arriba = índice 0)
  let fotos = [];
  let indiceActual = 0;

  function urlMiniatura(id, formato) {
    // Versión optimizada para la cuadrícula (ancho 600, buena calidad)
    return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/w_600,q_auto,f_auto/${id}.${formato}`;
  }

  function urlCompleta(id, formato) {
    return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/q_auto,f_auto/${id}.${formato}`;
  }

  function urlDescarga(id, formato) {
    // fl_attachment fuerza la descarga del archivo original (calidad completa)
    return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/fl_attachment/${id}.${formato}`;
  }

  async function cargarFotos() {
    try {
      // Lista pública de recursos con la etiqueta. Se agrega ?t= para evitar caché.
      const resp = await fetch(
        `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${TAG}.json?t=${Date.now()}`
      );

      // 404 = todavía no hay fotos con esta etiqueta (galería vacía, no es error)
      if (resp.status === 404) {
        if (mostradas.size === 0) {
          estado.innerHTML = "Las fotos de la fiesta aparecerán aquí muy pronto 💛";
        }
        return;
      }

      if (!resp.ok) throw new Error("no-list");

      const data = await resp.json();
      const recursos = (data.resources || []);

      if (recursos.length === 0 && mostradas.size === 0) {
        estado.innerHTML = "Las fotos de la fiesta aparecerán aquí muy pronto 💛";
        return;
      }

      estado.style.display = "none";

      // Más recientes primero
      recursos.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      for (const r of recursos) {
        if (mostradas.has(r.public_id)) continue;
        mostradas.add(r.public_id);

        const img = document.createElement("img");
        img.src = urlMiniatura(r.public_id, r.format);
        img.loading = "lazy";
        img.alt = "Foto de la fiesta";
        img.addEventListener("click", () => abrirPorId(r.public_id));

        // Insertar al principio para que las nuevas aparezcan arriba
        grid.insertBefore(img, grid.firstChild);
        fotos.unshift({ id: r.public_id, format: r.format });
      }
    } catch (e) {
      if (mostradas.size === 0) {
        estado.innerHTML =
          "No se pudo cargar la galería.<br>" +
          "Verifica que en Cloudinary esté activada la opción " +
          "<b>“Resource list”</b> (Settings → Security).";
      }
    }
  }

  function abrirPorId(id) {
    const idx = fotos.findIndex(f => f.id === id);
    if (idx >= 0) {
      indiceActual = idx;
      mostrarFoto();
      visor.classList.add("abierto");
    }
  }

  function mostrarFoto() {
    const f = fotos[indiceActual];
    if (!f) return;
    visorImg.src = urlCompleta(f.id, f.format);
    btnDescargar.href = urlDescarga(f.id, f.format);
    btnDescargar.setAttribute("download", `xv-camila-${f.id}.${f.format}`);
  }

  function siguienteFoto() {
    if (fotos.length === 0) return;
    indiceActual = (indiceActual + 1) % fotos.length;
    mostrarFoto();
  }

  function anteriorFoto() {
    if (fotos.length === 0) return;
    indiceActual = (indiceActual - 1 + fotos.length) % fotos.length;
    mostrarFoto();
  }

  function cerrarVisor() {
    visor.classList.remove("abierto");
    visorImg.src = "";
  }

  document.getElementById("cerrar").addEventListener("click", cerrarVisor);
  document.getElementById("siguiente").addEventListener("click", (e) => { e.stopPropagation(); siguienteFoto(); });
  document.getElementById("anterior").addEventListener("click", (e) => { e.stopPropagation(); anteriorFoto(); });

  // Cerrar solo al tocar el fondo oscuro (no la imagen, flechas ni botón)
  visor.addEventListener("click", (e) => { if (e.target === visor) cerrarVisor(); });

  // Deslizar con el dedo (izquierda/derecha)
  let touchStartX = null;
  visor.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].clientX;
  }, { passive: true });
  visor.addEventListener("touchend", (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) {
      if (dx < 0) { siguienteFoto(); } else { anteriorFoto(); }
    }
    touchStartX = null;
  }, { passive: true });

  // Flechas del teclado (en computadora)
  document.addEventListener("keydown", (e) => {
    if (!visor.classList.contains("abierto")) return;
    if (e.key === "ArrowRight") siguienteFoto();
    else if (e.key === "ArrowLeft") anteriorFoto();
    else if (e.key === "Escape") cerrarVisor();
  });

  // ---- Subida de fotos por los invitados ----
  const btnSubir       = document.getElementById("btnSubir");
  const inputFotos     = document.getElementById("inputFotos");
  const progresoSubida = document.getElementById("progresoSubida");

  btnSubir.addEventListener("click", () => inputFotos.click());
  inputFotos.addEventListener("change", () => subirMisFotos(inputFotos.files));

  async function subirMisFotos(archivos) {
    if (!archivos || archivos.length === 0) return;

    const total = archivos.length;
    let hechas = 0;
    btnSubir.disabled = true;
    progresoSubida.textContent = `Subiendo 0 de ${total}…`;

    for (const archivo of archivos) {
      try {
        const form = new FormData();
        form.append("upload_preset", UPLOAD_PRESET);
        form.append("tags", TAG);
        form.append("file", archivo);

        const resp = await fetch(
          `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
          { method: "POST", body: form }
        );
        if (resp.ok) hechas++;
      } catch (e) {
        // Si una falla, seguimos con las demás
      }
      progresoSubida.textContent = `Subiendo ${hechas} de ${total}…`;
    }

    btnSubir.disabled = false;
    inputFotos.value = "";
    progresoSubida.textContent =
      `¡Gracias! ${hechas} de ${total} fotos subidas 💛 Aparecerán abajo en un momento.`;

    // Intentar refrescar (las fotos nuevas pueden tardar ~1 min en aparecer)
    setTimeout(cargarFotos, 3000);
  }

  // ---- Bienvenida + música ----
  const bienvenida = document.getElementById("bienvenida");
  const audio      = document.getElementById("audio");
  const btnMute    = document.getElementById("btnMute");
  let silenciado = false;

  document.getElementById("btnEntrar").addEventListener("click", () => {
    bienvenida.classList.add("oculto");
    btnMute.style.display = "block";
    audio.volume = 0.4;
    audio.play().catch(() => {}); // el toque del botón permite reproducir
    setTimeout(() => { bienvenida.style.display = "none"; }, 600);
  });

  btnMute.addEventListener("click", () => {
    silenciado = !silenciado;
    audio.muted = silenciado;
    btnMute.textContent = silenciado ? "🔇" : "🔊";
  });

  // Pétalos cayendo en la bienvenida
  (function () {
    const colores = [
      "rgba(244,200,215,0.9)", "rgba(212,194,240,0.9)",
      "rgba(252,247,240,0.9)", "rgba(232,186,197,0.9)"
    ];
    for (let i = 0; i < 14; i++) {
      const p = document.createElement("div");
      p.className = "petalo";
      p.style.left = (Math.random() * 100) + "%";
      p.style.background = colores[i % colores.length];
      p.style.width = (10 + Math.random() * 8) + "px";
      p.style.height = (7 + Math.random() * 5) + "px";
      p.style.animationDuration = (6 + Math.random() * 6) + "s";
      p.style.animationDelay = (Math.random() * 6) + "s";
      bienvenida.appendChild(p);
    }
  })();

  // Carga inicial y auto-actualización cada 30 segundos
  cargarFotos();
  setInterval(cargarFotos, 30000);
</script>
</body>
</html>
